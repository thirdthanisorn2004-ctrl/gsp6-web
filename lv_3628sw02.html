  function parseName(rec){ try{ if(rec&&rec.Remark){ var j=JSON.parse(rec.Remark); if(j&&j.__name) return j.__name; } }catch(e){} return ''; }
  function parseLSIG(rec){

  var curId=null, curName='', curRec=null, curLSIG=null, editing=false;

  var _tcc=null;
  function buildTCC(d){
    var X0=46,X1=330,Y0=14,Y1=272,PW=X1-X0,PH=Y1-Y0;
    function xp(I){ return X0+(Math.log(I)/Math.LN10-1)/4*PW; }
    function yp(t){ return Y0+(3-Math.log(t)/Math.LN10)/5*PH; }
    function xInv(px){ return Math.pow(10, 1+(px-X0)/PW*4); }
    function tPhase(I,s){
      var Ir=parseFloat(d.L.Ir), tr=parseFloat(d.L.tr);
      var Isd=parseFloat(d.S.Isd), tsd=parseFloat(d.S.tsd);
      var Ii=parseFloat(d.I.Ii);
      if(d.I.on&&Ii&&I>=Ii*s) return 0.02;
      if(d.S.on&&Isd&&tsd&&I>=Isd*s) return tsd;
      if(d.L.on&&Ir&&tr&&I>Ir*s) return tr*36*Math.pow(Ir*s/I,2);
      return null;
    }
    _tcc={xp:xp,yp:yp,xInv:xInv,tPhase:tPhase,X0:X0,X1:X1,Y0:Y0,Y1:Y1};
    function samp(s){ var p=[]; for(var k=0;k<=240;k++){ var I=Math.pow(10,1+4*k/240); var t=tPhase(I,s); if(t!=null){ t=Math.max(0.01,Math.min(1000,t*s)); p.push([xp(I),yp(t)]); } } return p; }
    function str(p){ return p.map(function(a){return a[0].toFixed(1)+','+a[1].toFixed(1);}).join(' '); }
    var tol=parseFloat(d.tol)||0, f=tol/100;
    var mid=samp(1), lo=samp(1-f), hi=samp(1+f);
    var grid='';
    var xl=['10','100','1K','10K','100K'];
    for(var i=0;i<=4;i++){ var x=X0+i/4*PW; grid+='<line x1="'+x+'" y1="'+Y0+'" x2="'+x+'" y2="'+Y1+'" stroke="#eef1f5"/>'+'<text x="'+x+'" y="'+(Y1+13)+'" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#98a1ae">'+xl[i]+'</text>'; }
    var yl=['1K','100','10','1','.1','.01'];
    for(var j=0;j<=5;j++){ var y=Y0+j/5*PH; grid+='<line x1="'+X0+'" y1="'+y+'" x2="'+X1+'" y2="'+y+'" stroke="#eef1f5"/>'+'<text x="'+(X0-4)+'" y="'+(y+3)+'" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="9" fill="#98a1ae">'+yl[j]+'</text>'; }
    var band='';
    if(f>0 && lo.length && hi.length){ band='<polygon points="'+str(lo)+' '+str(hi.slice().reverse())+'" fill="rgba(37,99,235,.14)" stroke="none"/>'; }
    var line = mid.length?'<polyline points="'+str(mid)+'" fill="none" stroke="#0b56a4" stroke-width="2" stroke-linejoin="round"/>':'';
    var gnd='';
    var Ig=parseFloat(d.G.Ig), tg=parseFloat(d.G.tg);
    if(d.G.on&&Ig&&tg){ var gx=xp(Ig), gy=yp(Math.max(0.01,Math.min(1000,tg))); gnd='<polyline points="'+gx.toFixed(1)+','+Y0+' '+gx.toFixed(1)+','+gy.toFixed(1)+' '+X1+','+gy.toFixed(1)+'" fill="none" stroke="#0f8a4d" stroke-width="1.6" stroke-dasharray="5 3"/>'; }
    var empty = (!mid.length && !gnd) ? '<text x="'+((X0+X1)/2)+'" y="'+((Y0+Y1)/2)+'" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="12" fill="#b7bfca">ยังไม่มีข้อมูลพอวาดกราฟ</text>' : '';
    return '<svg id="tccSvg" viewBox="0 0 342 292" style="width:100%;height:auto;display:block;cursor:crosshair;"><rect x="'+X0+'" y="'+Y0+'" width="'+PW+'" height="'+PH+'" fill="#fff" stroke="#d7dee8"/>'+grid+band+gnd+line+empty+'<g id="tccCur" style="display:none;pointer-events:none;"><line id="tccVX" stroke="#11202f" stroke-width=".7" stroke-dasharray="3 2"/><line id="tccHX" stroke="#11202f" stroke-width=".7" stroke-dasharray="3 2"/><path id="tccDot" d="" stroke="#111" stroke-width="1.6"/><rect id="tccBoxR" fill="#11202f" rx="3"/><text id="tccBoxT" fill="#fff" font-family="JetBrains Mono,monospace" font-size="9.5" font-weight="600"/></g><text x="'+((X0+X1)/2)+'" y="290" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#98a1ae">Current (A)</text></svg>';
  }
  function fmtI(I){ return I>=1000?(I/1000).toFixed(I>=10000?0:2)+' kA':Math.round(I)+' A'; }
  function fmtT(t){ return t>=100?t.toFixed(0)+' s':t>=1?t.toFixed(2)+' s':t.toFixed(3)+' s'; }
  function wireTCC(){
    var svg=document.getElementById('tccSvg'); if(!svg||!_tcc) return;
    var g=_tcc;
