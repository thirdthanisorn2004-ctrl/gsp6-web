document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

shrink:0;\"><\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono', monospace; font-size:12px;\">{{ ci.id }}<\u002Fspan>\n              <span style=\"margin-left:auto; font-size:11px; color:#98a1ae;\">{{ ci.pickup }}A<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"flex:1; overflow-y:auto; padding:18px 22px;\">\n          <sc-if value=\"{{ coordNoneChosen }}\">\n            <div style=\"padding:26px 16px; border:1px dashed #d7dee8; border-radius:10px; text-align:center; color:#8a94a3; font-size:13px;\">เลือก relay จากรายการซ้ายเพื่อซ้อนกราฟ — เลือกได้หลายตัว<\u002Fdiv>\n          <\u002Fsc-if>\n          {{ coordChart }}\n          <sc-for list=\"{{ coordChecks }}\" as=\"cc\" hint-placeholder-count=\"1\">\n            <div style=\"display:flex; align-items:center; gap:10px; margin-top:10px; padding:9px 13px; border-radius:9px; font-size:12.5px; background:#f7f9fc;\">\n              <sc-if value=\"{{ cc.ok }}\"><span style=\"color:#0f8a4d; font-weight:700;\">✓<\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ cc.bad }}\"><span style=\"color:#c0392b; font-weight:700;\">⚠<\u002Fspan><\u002Fsc-if>\n              <span style=\"font-family:'JetBrains Mono', monospace; font-size:11.5px;\">{{ cc.pair }}<\u002Fspan>\n              <span style=\"color:#586273;\">CTI {{ cc.cti }}<\u002Fspan>\n              <span style=\"margin-left:auto; color:#8a94a3; font-size:11.5px;\">{{ cc.note }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div onclick=\"{{ closePopup }}\" style=\"{{ popup.overlayStyle }}\">\n    <div onclick=\"{{ stopProp }}\" style=\"width:580px; max-width:100%; max-height:86vh; background:#fff; border-radius:16px; box-shadow:0 30px 80px -20px rgba(8,20,38,.55); display:flex; flex-direction:column; overflow:hidden;\">\n      <div style=\"display:flex; align-items:flex-start; gap:14px; padding:2 \"border-color:#c0392b; background:#fbe6e6;\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18\"><\u002Fpath><path d=\"M8 6V4h8v2\"><\u002Fpath><path d=\"M19 6l-1 14H6L5 6\"><\u002Fpath><\u002Fsvg>\n              ลบ Relay นี้\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.1em; color:#0b56a4; font-weight:600; margin:14px 0 8px;\">Device Number<\u002Fdiv>\n        <div style=\"margin:0 0 18px; border:1px solid #e7ebf1; border-radius:12px; background:#fff; padding:18px; display:flex; justify-content:center;\">\n          {{ popup.deviceMeter }}\n        <\u002Fdiv>\n        <sc-if value=\"{{ popup.loading }}\"><div style=\"padding:18px 2px; font-size:13px; color:#98a1ae;\">Loading parameters from API…<\u002Fdiv><\u002Fsc-if>\n        <sc-if value=\"{{ popup.noData }}\"><div style=\"margin-top:14px; padding:11px 13px; border-radius:10px; background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; font-size:12.5px;\">No parameter record for this relay in the database yet.<\u002Fdiv><\u002Fsc-if>\n        <div style=\"display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;\">\n          <sc-for list=\"{{ popup.tabs }}\" as=\"tb\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ tb.onClick }}\" style=\"{{ tb.tabStyle }}\">{{ tb.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.1em; color:#0b56a4; font-weight:600; margin-bottom:8px;\">{{ popup.activeTitle }}<\u002Fdiv>\n        <div style=\"border:1px solid #eef1f5; border-radius:10px; overflow:hidden;\">\n          <sc-for list=\"{{ popup.activeRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; padding:9px 13px; border-top:1px solid #f3f5f8; font-size:13px;\">\n              <span style=\"color:#586273;\">{{ r.k }}<\u002Fspan>\n              <sc-if value=\"{{ r.notEditing }}\"><span style=\"font-family:'JetBrains Mono', monospace; font-size:12.5px; font-weight:500; color:#11202f;\">{{ r.val }}<\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ r.editing }}\"><input value=\"{{ r.inputVal }}\" onchange=\"{{ r.onChange }}\" style=\"{{ r.inputStyle }}\"><\u002Fsc-if>\n              <sc-if value=\"{{ r.editingCurve }}\"><select value=\"{{ r.inputVal }}\" onchange=\"{{ r.onChange }}\" style=\"width:180px; border:1px solid #cdd5e0; border-radius:7px; padding:5px 8px; font-family:'Plus Jakarta Sans', sans-serif; font-size:12px; font-weight:500; color:#11202f; background:#fff; outline:none;\">\n                <sc-for list=\"{{ r.curveOptions }}\" as=\"o\" hint-placeholder-count=\"5\"><option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ popup.showTccEmpty }}\">\n        <div style=\"margin-top:18px; padding:22px 16px; border:1px dashed #d7dee8; border-radius:10px; text-align:center; color:#8a94a3; font-size:12.5px; font-family:'Plus Jakarta Sans', sans-serif;\">\n          ยังไม่มีข้อมูลการตั้งค่าสำหรับกราฟ TCC — กด Edit แล้วกรอกอย่างน้อย <b>Primary Amps<\u002Fb> (จำเป็น) และแนะนำ Curve, Time Dial, Inst. Prim Amps เพื่อให้กราฟตรงกับค่าจริง\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ popup.showTcc }}\">\n        <div style=\"margin-top:18px;\">\n          <div style=\"font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.1em; color:#0b56a4; font-weight:600; margin-bottom:7px;\">{{ popup.tccName }} · TCC Curve<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono', monospace; font-size:10px; color:#8a94a3; margin:-3px 0 7px;\">{{ popup.tccInfo }}<\u002Fdiv>\n          <div style=\"border:1px solid #eef1f5; border-radius:10px; padding:12px 10px 8px;\">\n            <svg width=\"100%\" viewBox=\"0 0 300 204\" style=\"display:block; font-family:'JetBrains Mono', monospace;\">\n              <rect x=\"46\" y=\"14\" width=\"242\" height=\"162\" fill=\"#fcfbfd\" stroke=\"#c9b8d6\"><\u002Frect>\n              <sc-for list=\"{{ popup.tccXMinor }}\" as=\"gx\" hint-placeholder-count=\"20\"><line x1=\"{{ gx.x }}\" y1=\"{{ tcc.y0 }}\" x2=\"{{ gx.x }}\" y2=\"{{ tcc.y1 }}\" stroke=\"#efeaf3\" stroke-width=\"0.6\"><\u002Fline><\u002Fsc-for>\n              <sc-for list=\"{{ tcc.yMinor }}\" as=\"gy\" hint-placeholder-count=\"13\"><line x1=\"{{ tcc.x0 }}\" y1=\"{{ gy.y }}\" x2=\"{{ tcc.x1 }}\" y2=\"{{ gy.y }}\" stroke=\"#efeaf3\" stroke-width=\"0.6\"><\u002Fline><\u002Fsc-for>\n              <sc-for list=\"{{ popup.tccXt }}\" as=\"gx\" hint-placeholder-count=\"6\"><line x1=\"{{ gx.x }}\" y1=\"{{ tcc.y0 }}\" x2=\"{{ gx.x }}\" y2=\"{{ tcc.y1 }}\" stroke=\"#eef1f5\" stroke-width=\"1\"><\u002Fline><\u002Fsc-for>\n              <sc-for list=\"{{ tcc.yt }}\" as=\"gy\" hint-placeholder-count=\"6\"><line x1=\"{{ tcc.x0 }}\" y1=\"{{ gy.y }}\" x2=\"{{ tcc.x1 }}\" y2=\"{{ gy.y }}\" stroke=\"#eef1f5\" stroke-width=\"1\"><\u002Fline><\u002Fsc-for>\n              <g font-size=\"9\" font-weight=\"600\" fill=\"#4a5462\" text-anchor=\"middle\">\n                {{ popup.tccXLabels }}\n              <\u002Fg>\n              <g font-size=\"9\" font-weight=\"600\" fill=\"#4a5462\" text-anchor=\"end\" dominant-baseline=\"middle\">\n                <text x=\"41\" y=\"14\">1000<\u002Ftext><text x=\"41\" y=\"46.4\">100<\u002Ftext><text x=\"41\" y=\"78.8\">10<\u002Ftext><text x=\"41\" y=\"111.2\">1<\u002Ftext><text x=\"41\" y=\"143.6\">0.1<\u002Ftext><text x=\"41\" y=\"176\">0.01<\u002Ftext>\n              <\u002Fg>\n              <text x=\"167\" y=\"199\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"700\" fill=\"#2a2f37\">Current in Amperes<\u002Ftext>\n              <text transform=\"rotate(-90 8 95)\" x=\"8\" y=\"95\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"700\" fill=\"#2a2f37\">Time in Seconds<\u002Ftext>\n              <polyline points=\"{{ popup.tccPath }}\" fill=\"none\" stroke=\"{{ popup.tccColor }}\" stroke-width=\"1.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n              <sc-if value=\"{{ popup.tccHasOlr }}\" hint-placeholder-val=\"{{ false }}\">\n                <polyline points=\"{{ popup.tccOlrPath }}\" fill=\"none\" stroke=\"#0f8a4d\" stroke-width=\"1.6\" stroke-dasharray=\"5 3\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n                <g font-size=\"7.5\" font-weight=\"700\">\n                  <rect x=\"200\" y=\"10\" width=\"88\" height=\"24\" rx=\"4\" fill=\"rgba(255,255,255,.92)\" stroke=\"#c8d2de\" stroke-width=\"0.6\"><\u002Frect>\n                  <line x1=\"206\" y1=\"17\" x2=\"220\" y2=\"17\" stroke=\"#7a4f9e\" stroke-width=\"2\"><\u002Fline>\n                  <text x=\"224\" y=\"20\" fill=\"#2a2f37\">Phase 50/51<\u002Ftext>\n                  <line x1=\"206\" y1=\"28\" x2=\"220\" y2=\"28\" stroke=\"#0f8a4d\" stroke-width=\"2\" stroke-dasharray=\"4 2\"><\u002Fline>\n                  <text x=\"224\" y=\"31\" fill=\"#2a2f37\">Overload 49<\u002Ftext>\n                <\u002Fg>\n              <\u002Fsc-if>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { zoom: 0.7, panX: 0, panY: 0, selectedRelayId: 'GSP6-R01', popupRelayId: null, relayData: null, activeTab: 'ct', sidebarOpen: true, editMode: false, editValues: {}, saving: false, saveError: null, saveOk: false, relayNames: {}, deviceNumbers: {}, relayGroups: {}, extraRelays: {}, activeRelayIdx: 0, deviceCells: {} };\n\n  // ── Edit log (persisted in localStorage, newest first, capped at 400) ──\n  addLog(action, relay, detail) {\n    let user = 'user';\n    try { user = localStorage.getItem('username') || (localStorage.getItem('token') ? 'admin' : 'user'); } catch (e) {}\n    const entry = { t: Date.now(), action, relay, detail: detail || '', user };\n    let arr = [];\n    try { arr = JSON.parse(localStorage.getItem('gsp6_edit_log') || '[]'); } catch (e) {}\n    arr.unshift(entry);\n    if (arr.length > 400) arr = arr.slice(0, 400);\n    try { localStorage.setItem('gsp6_edit_log', JSON.stringify(arr)); } catch (e) {}\n    this.forceUpdate();\n  }\n\n  // Zoom about the viewport center (used by the +/- buttons).\n  zoomCenter(factor) {\n    const el = this.canvasEl; if (!el) return;\n    const r = el.getBoundingClientRect();\n    const mx = r.width / 2, my = r.height / 2;\n    const s = this.state;\n    const nz = Math.min(4, Math.max(0.2, s.zoom * factor));\n    const f = nz / s.zoom;\n    this.setState({ zoom: nz, panX: mx - (mx - s.panX) * f, panY: my - (my - s.panY) * f });\n  }\n\n  // Fit the whole SLD (1592×674) into the viewport, centered.\n  fitToScreen() {\n    const el = this.canvasEl; if (!el) return;\n    const r = el.getBoundingClientRect();\n    const W = 1592, H = 674, PAD = 30;\n    const nz = Math.min((r.width - PAD * 2) / W, (r.height - PAD * 2) / H);\n    this.setState({ zoom: nz, panX: (r.width - W * nz) / 2, panY: (r.height - H * nz) / 2 });\n  }\n\n  componentDidMount() {\n    let names = {};\n    try { names = JSON.parse(localStorage.getItem('gsp6_relay_names') || '{}') || {}; } catch (e) {}\n    let devnums = {};\n    try { devnums = JSON.parse(localStorage.getItem('gsp6_device_numbers') || '{}') || {}; } catch (e) {}\n    let groups = {};\n    try { groups = JSON.parse(localStorage.getItem('gsp6_relay_groups') || '{}') || {}; } catch (e) {}\n    let extras = {};\n    try { extras = JSON.parse(localStorage.getItem('gsp6_extra_relays') || '{}') || {}; } catch (e) {}\n    let cells = {};\n    try { cells = JSON.parse(localStorage.getItem('gsp6_device_cells') || '{}') || {}; } catch (e) {}\n    this.setState({ relayNames: names, deviceNumbers: devnums, relayGroups: groups, extraRelays: extras, deviceCells: cells });\n    this.loadRelays();\n  }\n\n  async loadRelays() {\n    try {\n      const headers = {};\n      let t = null;\n      try { t = localStorage.getItem('token'); } catch (e) {}\n      if (t) headers['Authorization'] = 'Bearer ' + t;\n      const r = await fetch('https://gsp-api.onrender.com/api/relays', { headers });\n      const j = await r.json();\n      const map = {};\n      for (const row of (j.data || [])) { if (row.Relay_ID) map[row.Relay_ID] = row; }\n      this.setState({ relayData: map });\n    } catch (e) {\n      this.setState({ relayData: {} });\n    }\n  }\n\n  renderVals() {\n    const z = this.state.zoom;\n\n    // ===================== GSP6 SINGLE LINE DIAGRAM =====================\n    const lines = [], buses = [], transformers = [], motors = [], boxes = [],\n          grounds = [], fuses = [], breakers = [], ties = [], labels = [];\n    const cts = [], arrows = [];\n    const L = (x1, y1, x2, y2) => lines.push({ x1, y1, x2, y2 });\n    const BUS = (x, y, w) => buses.push({ x, y, w });\n    const TR = (x, y) => transformers.push({ x, y });\n    const MO = (x, y, t, r) => motors.push({ x, y, t: t || 'M', r: r || 13 });\n    const BOX = (x, y, w, h, t, fs) => boxes.push({ x, y, w, h, t, fs: fs || 8.5, tx: x + w / 2, ty: y + h / 2 + 3 });\n    const GND = (x, y) => grounds.push({ x, y });\n    const FUSE = (x, y) => fuses.push({ x, y });\n    const BRK = (x, y, lbl) => breakers.push({ x, y, lbl: lbl || '' });\n    const TIE = (x, y, lbl) => ties.push({ x, y, rx: x - 7, ry: y - 7, lbl: lbl == null ? 'N.O' : lbl });\n    const T = (x, y, t, a, s) => labels.push({ x, y, t, a: a || 'middle', s: s || 9 });\n    const ML = (x, y, arr, a, s, lh) => arr.forEach((t, i) => labels.push({ x, y: y + i * (lh || 10.5), t, a: a || 'start', s: s || 8 }));\n    const TRLBL = (x, y, nm, z) => ML(x, y, [nm, '3000kVA', '11/0.4kV', 'Dyn 11', z || '%Z=8.5'], 'start', 8, 10);\n\n    const BUSY = 445;\n\n    // ---- corner title + main buses ----\n    BOX(20, 18, 90, 22, 'GSP6 S/S', 11);\n    BUS(55, BUSY, 450);            // 3628SW01A\n    BUS(517, BUSY, 700);           // 3628SW01B\n    T(58, BUSY - 9, '3Ph, 3W, 11kV, 50Hz,3200A, 40kA, 1Sec', 'start', 8);\n    T(1214, BUSY - 9, '3Ph, 3W, 11kV, 50Hz,3200A, 40kA, 1Sec', 'end', 8);\n    T(345, BUSY + 20, '3628SW01A', 'middle', 12);\n    T(760, BUSY + 20, '3628SW01B', 'middle', 12);\n    TIE(511, BUSY, 'N.O');\n\n    // ===== TOP FEEDER 1 (3629SW224 -> 3628TR01A) =====\n    const topFeeder = (x, sw, trLines) => {\n      T(x, 32, sw, 'middle', 10);\n      L(x, 42, x, 150);\n      BOX(x - 60, 158, 30, 16, '400A', 8);\n      L(x - 30, 166, x, 166);\n      TR(x, 162);\n      L(x - 22, 162, x - 40, 162); L(x - 40, 162, x - 40, 196); GND(x - 40, 196);\n      ML(x + 18, 138, trLines, 'start', 8.5, 10.5);\n      L(x, 180, x, BUSY);\n    };\n    topFeeder(315, '3629SW224', ['3628TR01A', '50/55MVA', '33/11.5kV', 'Dyn11, ONAF', '%Z=11']);\n    ML(333, 70, ['18/30 (36)kV, AWA', '4-1Cx400mm/Phase'], 'start', 8.5, 11);\n    BRK(315, 402, 'N.C');\n\n    topFeeder(780, '3629SW228', ['3628TR01B', '50/55MVA', '33/11.5kV', 'Dyn11, ONAF', '%Z=11']);\n    ML(798, 70, ['18/30 (36)kV, AWA', '4-1Cx400mm/Phase'], 'start', 8.5, 11);\n    BRK(780, 402, 'N.C');\n\n    // ===== TOP FEEDER 3 (3629SW219 -> 3625TR01 + GT) =====\n    const F3 = 965, GTx = 1175;\n    topFeeder(F3, '3629SW219', ['3625TR01', '31.5MVA', '33/11kV', 'YNd1, ONAN', '%Z=11']);\n    ML(983, 70, ['18/30 (36)kV, AWA', '2-1Cx400mm/Phase'], 'start', 8.5, 11);\n    BRK(F3, 400, 'N.C');\n    labels.push({ x: F3 + 18, y: 360, t: '8.7/15 (17.5)kV, AWA 6-1Cx400mm/Phase', a: 'middle', s: 8, rot: -90 });\n    // GT branch: cable loop from main vertical (top horizontal) → GT, then earthing down to ground\n    L(F3, 250, GTx, 250);                 // top horizontal cable run\n    L(GTx, 250, GTx, 287);                // down into GT\n    MO(GTx, 305, 'GT', 18);\n    ML(GTx + 24, 297, ['11kV, 50Hz', '25MW'], 'start', 9, 12);\n    L(GTx, 323, GTx, 470);                // GT earthing string down\n    BRK(GTx, 365, 'N.O');\n    ML(GTx + 14, 398, ['8.7/15kV AWA', '1-1Cx185mm'], 'start', 8, 10);\n    FUSE(GTx, 420);\n    T(GTx + 17, 434, '400A', 'start', 8);\n    GND(GTx, 470);\n\n    // ===== 11kV LOADS off main bus =====\n    // Lean Solution Pump (SF start)\n    L(445, BUSY, 445, 660); BRK(445, 495, '');\n    BOX(427, 522, 36, 22, 'SF', 9);\n    ML(467, 528, ['STARTING', 'ONLY'], 'start', 8, 10);\n    BRK(445, 610, '');\n    MO(445, 666, 'M', 14);\n    ML(445, 690, ['3601/2PM002,R', 'LEAN SOLUTION PUMP', '(4MW)'], 'middle', 8.5, 11);\n    // Refrigerant Comp (SF start)\n    L(605, BUSY, 605, 660); BRK(605, 495, '');\n    BOX(587, 522, 36, 22, 'SF', 9);\n    ML(627, 528, ['STARTING', 'ONLY'], 'start', 8, 10);\n    BRK(605, 610, '');\n    MO(605, 666, 'M', 14);\n    ML(605, 690, ['3607CM01', 'REFRIGERANT COMP', '(19MW)'], 'middle', 8.5, 11);\n    // Regeneration Comp (VSD + 11/6.9kV)\n    BRK(885, 495, ''); BRK(945, 495, '');\n    L(885, BUSY, 885, 700); L(945, BUSY, 945, 590);\n    BOX(862, 522, 46, 20, 'VSD', 9);\n    TR(945, 575); ML(963, 568, ['11/6.9kV', '1750KVA'], 'start', 8, 11);\n    L(945, 588, 945, 640); BRK(945, 652, ''); L(945, 664, 945, 700); L(885, 700, 945, 700);\n    BRK(885, 640, '');\n    MO(885, 712, 'M', 14);\n    ML(885, 736, ['3602C001M01', 'REGENERATION COMP.', '(850kW)'], 'middle', 8.5, 11);\n    // Hot Oil Cir Pump (SF + 6.6/11.5kV Siemens)\n    BRK(1015, 495, ''); BRK(1055, 495, '');\n    L(1015, BUSY, 1015, 715); L(1055, BUSY, 1055, 560);\n    BOX(1037, 522, 36, 20, 'SF', 9); ML(1078, 525, ['STARTING', 'ONLY'], 'start', 7.5, 9);\n    TR(1055, 580); ML(1073, 566, ['6.6/11.5kV', '2000kVA', '(BY SIEMENS)'], 'start', 8, 10);\n    L(1055, 596, 1055, 640); BRK(1055, 652, ''); L(1055, 664, 1055, 715); L(1015, 715, 1055, 715);\n    BRK(1015, 640, '');\n    MO(1015, 727, 'M', 14);\n    ML(1015, 751, ['3608PM002A~D', 'HOT OIL CIR. PUMP', '(1800kW)'], 'middle', 8.5, 11);\n    // Dilution Fan (VSD)\n    BRK(1160, 495, '');\n    L(1160, BUSY, 1160, 700);\n    BOX(1138, 522, 46, 20, 'VSD', 9);\n    MO(1160, 712, 'M', 14);\n    ML(1160, 736, ['3634-F-001-CM01', 'DILUTION FAN', '(550kW, 11kV)'], 'middle', 8.5, 11);\n\n    // ===== 400V CASCADE (nested pyramid, cascaded bus-to-bus) =====\n    const cY = [805, 950, 1085, 1212, 1335];\n    const cId = ['06', '05', '04', '03', '02'];\n    const cLeft  = [210, 175, 135, 92, 50];     // left bus left edge per level (widens down)\n    const cRight = [660, 695, 735, 778, 820];   // right bus right edge per level\n    const cCL = 470, cCR = 560;                  // inner ends around the tie\n    cY.forEach((y, i) => {\n      BUS(cLeft[i], y, cCL - cLeft[i]);\n      BUS(cCR, y, cRight[i] - cCR);\n      L(cCL, y, 504, y); TIE(511, y, 'N.O'); L(518, y, cCR, y);\n      T(cLeft[i], y + 16, '400-230V, 5000A, 85kA  3628SW' + cId[i] + 'A', 'start', 8);\n      T(cRight[i], y + 16, '3628SW' + cId[i] + 'B', 'end', 8);\n    });\n    // one cascade column (sign = -1 left, +1 right)\n    const cascadeSide = (sign, edges, names) => {\n      for (let i = 0; i < 5; i++) {\n        const topY = (i === 0) ? BUSY : cY[i - 1];\n        const botY = cY[i];\n        const x = (i === 0) ? edges[0] : edges[i - 1];   // sits at outer end of bus above\n        const ty = (topY + botY) / 2 + (i === 0 ? 60 : 0);\n        L(x, topY, x, ty - 12);\n        TR(x, ty);\n        L(x, ty + 12, x, botY);\n        BRK(x, (ty + botY) / 2 + 4, 'N.C');\n        // earthing stub on the outer side\n        const gx = x + sign * 24;\n        L(x, ty, gx, ty); GND(gx, ty + 2);\n        // transformer label on the inner side\n        const lx = x - sign * 16;\n        ['3000kVA', '11/0.4kV', 'Dyn 11', '%Z=8.5'].forEach((tline, j) =>\n          labels.push({ x: lx, y: ty - 24 + j * 10, t: tline, a: sign < 0 ? 'start' : 'end', s: 8, rotT: '' }));\n        labels.push({ x: lx, y: ty - 34, t: names[i], a: sign < 0 ? 'start' : 'end', s: 8, rotT: '' });\n        // 1250A sub-bus label at the TR05 level\n        if (i === 1) {\n          labels.push({ x: lx, y: ty - 56, t: '400-230V, 1250A, 85kA', a: sign < 0 ? 'start' : 'end', s: 7.5, rotT: '' });\n          labels.push({ x: lx, y: ty - 46, t: '3628SW06C' + (sign < 0 ? 'A' : 'B'), a: sign < 0 ? 'start' : 'end', s: 7.5, rotT: '' });\n        }\n      }\n    };\n    cascadeSide(-1, cLeft, ['3628TR06A', '3628TR05A', '3628TR04A', '3628TR03A', '3628TR02A']);\n    cascadeSide(1, cRight, ['3628TR06B', '3628TR05B', '3628TR03B', '3628TR03B', '3628TR02B']);\n\n    // ===== DG / LOAD BANK (bottom right) =====\n    MO(910, 1075, 'DG', 18);\n    ML(936, 1066, ['0.4kV', '1800kW', 'PF=0.8'], 'start', 8.5, 11);\n    L(910, 1093, 910, 1335);                       // main vertical down to bottom bus\n    BUS(735, 1335, 180);                           // extend bottom 0.4kV bus under DG\n    BRK(910, 1165, 'N.C');                          // N.C on DG vertical\n    L(910, 1215, 1110, 1215);                       // branch right to load bank drop\n    L(1110, 1215, 1110, 1268);                      // drop to load bank\n    BRK(1110, 1240, 'N.O');                          // N.O on load bank drop\n    BOX(1065, 1270, 90, 28, 'LOAD BANK', 9.5);\n    T(1110, 1318, '(900 kW)', 'middle', 9);\n    BRK(910, 1300, 'N.O');                           // N.O where DG vertical meets bottom bus\n\n    labels.forEach((l) => { l.rotT = l.rot ? ('rotate(' + l.rot + ' ' + l.x + ' ' + l.y + ')') : ''; });\n\n    // Make every breaker a clickable relay; selecting one drives the sidebar.\n    const selId = this.state.selectedRelayId;\n    const levelOf = (y) => y < 500 ? '33 / 11kV' : (y < 760 ? '11kV' : '0.4kV');\n    const BRKPTS
