document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gn:center; color:#98a1ae; font-size:13px;\">ยังไม่มีประวัติการแก้ไข<\u002Fdiv><\u002Fsc-if>\n        <sc-for list=\"{{ logItems }}\" as=\"lg\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex; gap:12px; padding:11px 2px; border-bottom:1px solid #f3f5f8; font-size:12.5px; align-items:flex-start;\">\n            <div style=\"font-family:'JetBrains Mono', monospace; color:#98a1ae; white-space:nowrap;\">{{ lg.time }}<\u002Fdiv>\n            <div style=\"{{ lg.badgeStyle }}\">{{ lg.action }}<\u002Fdiv>\n            <div style=\"font-weight:600; color:#11202f; white-space:nowrap;\">{{ lg.relay }}<\u002Fdiv>\n            <div style=\"color:#586273; word-break:break-word;\">{{ lg.detail }}<\u002Fdiv>\n            <div style=\"margin-left:auto; color:#8b95a5; white-space:nowrap;\">{{ lg.user }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== COORDINATION MODAL ===== -->\n  <div sc-camel-on-click=\"{{ closeCoord }}\" style=\"{{ coordOverlayStyle }}\">\n    <div sc-camel-on-click=\"{{ stopProp }}\" style=\"width:860px; max-width:94%; max-height:88vh; background:#fff; border-radius:16px; box-shadow:0 24px 70px rgba(9,20,35,.35); display:flex; flex-direction:column; overflow:hidden;\">\n      <div style=\"display:flex; align-items:center; gap:14px; padding:18px 22px; border-bottom:1px solid #eff2f7;\">\n        <div style=\"font-family:'Space Grotesk', sans-serif; font-size:18px; font-weight:700; color:#11202f;\">Coordination Curves<\u002Fdiv>\n        <div style=\"display:flex; gap:6px; margin-left:10px;\">\n          <div sc-camel-on-click=\"{{ setCoordPhase }}\" style=\"{{ coordPhaseStyle }}\">Phase 50/51<\u002Fdiv>\n          <div sc-camel-on-click=\"{{ setCoordGround }}\" style=\"{{ coordGroundStyle }}\">Ground 50N/51N<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <div sc-camel-on-click=\"{{ closeCoord }}\" style=\"width:32px; height:32px; bo em; color:#0b56a4; font-weight:600; margin:16px 0 8px;\">Device Number<\u002Fdiv>\n        <div style=\"margin:0 0 18px; border:1px solid #e7ebf1; border-radius:12px; background:#fff; padding:18px; display:flex; justify-content:center;\">\n          {{ popup.deviceMeter }}\n        <\u002Fdiv>\n\n        <!-- TCC graph on top, with its own Phase / Ground selector (panel sketch) -->\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin:2px 0 8px;\">\n          <div style=\"font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.1em; color:#0b56a4; font-weight:600;\">{{ popup.tccName }} · TCC Curve<\u002Fdiv>\n          <div style=\"display:flex; gap:7px;\">\n            <div sc-camel-on-click=\"{{ popup.setGraphPhase }}\" style=\"{{ popup.graphPhaseStyle }}\">Phase<\u002Fdiv>\n            <div sc-camel-on-click=\"{{ popup.setGraphGround }}\" style=\"{{ popup.graphGroundStyle }}\">Ground<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ popup.showTccOff }}\">\n        <div style=\"margin-bottom:16px; padding:20px 16px; border:1px dashed #e0cfce; border-radius:10px; text-align:center; color:#b3564b; font-size:12.5px; font-weight:600; font-family:'Plus Jakarta Sans', sans-serif; background:#fbf4f4;\">\n          ฟังก์ชันฝั่งนี้ถูกปิด (OFF) — ไม่แสดงกราฟ TCC\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ popup.showTccEmpty }}\">\n        <div style=\"margin-bottom:16px; padding:22px 16px; border:1px dashed #d7dee8; border-radius:10px; text-align:center; color:#8a94a3; font-size:12.5px; font-family:'Plus Jakarta Sans', sans-serif;\">\n          ยังไม่มีข้อมูลการตั้งค่าสำหรับกราฟ TCC — กด Edit แล้วกรอกอย่างน้อย <b>Primary Amps<\u002Fb>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ popup.showTcc }}\">\n        <div style=\"margin-bottom:16px;\">\n          <div style=\"font-family:'JetBrains Mono', monospace; font-size:10px; color:#8a94 \u002Ftext>\n              <\u002Fg>\n              <text x=\"167\" y=\"199\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"700\" fill=\"#2a2f37\">Current in Amperes<\u002Ftext>\n              <text transform=\"rotate(-90 8 95)\" x=\"8\" y=\"95\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"700\" fill=\"#2a2f37\">Time in Seconds<\u002Ftext>\n              <sc-if value=\"{{ popup.tccHasMain }}\" hint-placeholder-val=\"{{ true }}\">\n                <polyline points=\"{{ popup.tccPath }}\" fill=\"none\" stroke=\"{{ popup.tccColor }}\" stroke-width=\"1.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ popup.tccHasInst }}\" hint-placeholder-val=\"{{ false }}\">\n                <polyline points=\"{{ popup.tccInstPath }}\" fill=\"none\" stroke=\"{{ popup.tccColor }}\" stroke-width=\"1.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ popup.tccHasOlr }}\" hint-placeholder-val=\"{{ false }}\">\n                <polyline points=\"{{ popup.tccOlrPath }}\" fill=\"none\" stroke=\"#0f8a4d\" stroke-width=\"1.6\" stroke-dasharray=\"5 3\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n                <g font-size=\"7.5\" font-weight=\"700\">\n                  <rect x=\"200\" y=\"10\" width=\"88\" height=\"24\" rx=\"4\" fill=\"rgba(255,255,255,.92)\" stroke=\"#c8d2de\" stroke-width=\"0.6\"><\u002Frect>\n                  <line x1=\"206\" y1=\"17\" x2=\"220\" y2=\"17\" stroke=\"#7a4f9e\" stroke-width=\"2\"><\u002Fline>\n                  <text x=\"224\" y=\"20\" fill=\"#2a2f37\">Phase 50/51<\u002Ftext>\n                  <line x1=\"206\" y1=\"28\" x2=\"220\" y2=\"28\" stroke=\"#0f8a4d\" stroke-width=\"2\" stroke-dasharray=\"4 2\"><\u002Fline>\n                  <text x=\"224\" y=\"31\" fill=\"#2a2f37\">Overload 49<\u002Ftext>\n                <\u002Fg>\n              <\u002Fsc-if>\n              {{ popup.tccCursor }}\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ popup.loading }}\"><div style=\"padding:18px 2px; font-size:13px; color:#98a1ae;\">Loading parameters from API…<\u002Fdiv><\u002Fsc-if>\n        <sc-if value=\"{{ popup.noData }}\"><div style=\"margin-top:14px; padding:11px 13px; border-radius:10px; background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; font-size:12.5px;\">No parameter record for this relay in the database yet.<\u002Fdiv><\u002Fsc-if>\n\n        <!-- Protection-function badges + on/off (panel sketch) -->\n        <div style=\"display:flex; gap:7px; align-items:center; margin-bottom:10px; flex-wrap:wrap;\">\n          <sc-for list=\"{{ popup.badges }}\" as=\"bd\" hint-placeholder-count=\"7\">\n            <div sc-camel-on-click=\"{{ bd.onClick }}\" style=\"{{ bd.badgeStyle }}\">{{ bd.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ popup.funcIsProt }}\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\">\n          <div sc-camel-on-click=\"{{ popup.onToggleFunc }}\" style=\"{{ popup.funcSwitchStyle }}\">\n            <div style=\"{{ popup.funcKnobStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family:'Plus Jakarta Sans', sans-serif; font-size:13px; font-weight:700; color:{{ popup.funcStateColor }};\">{{ popup.funcStateText }}<\u002Fspan>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.1em; color:#0b56a4; font-weight:600; margin-bottom:8px;\">{{ popup.activeTitle }}<\u002Fdiv>\n        <div style=\"border:1px solid #eef1f5; border-radius:10px; overflow:hidden;\">\n          <sc-for list=\"{{ popup.activeRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; padding:9px 13px; border-top:1px solid #f3f5f8; font-size:13px;\">\n              <span style=\"color:#586273;\">{{ r.k }}<\u002Fspan>\n              <sc-if value=\"{{ r.notEditing }}\"><span style=\"font-family:'JetBrains Mono', monospace; font-size:12.5px; font-weight:500; color:#11202f;\">{{ r.val }}<\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ r.editing }}\"><input value=\"{{ r.inputVal }}\" sc-camel-on-change=\"{{ r.onChange }}\" style=\"{{ r.inputStyle }}\"><\u002Fsc-if>\n              <sc-if value=\"{{ r.editingCurve }}\"><sc-raw-select value=\"{{ r.inputVal }}\" sc-camel-on-change=\"{{ r.onChange }}\" style=\"width:180px; border:1px solid #cdd5e0; border-radius:7px; padding:5px 8px; font-family:'Plus Jakarta Sans', sans-serif; font-size:12px; font-weight:500; color:#11202f; background:#fff; outline:none;\">\n                <sc-for list=\"{{ r.curveOptions }}\" as=\"o\" hint-placeholder-count=\"5\"><option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n              <\u002Fsc-raw-select><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { zoom: 0.42, panX: 0, panY: 0, selectedRelayId: 'GSP6-R01', popupRelayId: null, relayData: null, activeTab: 'ct', graphElem: 'Phase', funcSel: '51', funcOff: {}, funcParams: {}, popupHoverX: null, popupHoverY: null, sidebarOpen: true, editMode: false, editValues: {}, saving: false, saveError: null, saveOk: false, relayNames: {}, deviceNumbers: {}, relayGroups: {}, extraRelays: {}, activeRelayIdx: 0, deviceCells: {} };\n\n  // ── Edit log (persisted in localStorage, newest first, capped at 400) ──\n  addLog(action, relay, detail) {\n    let user = 'user';\n    try { user = localStorage.getItem('username') || (localStorage.getItem('token') ? 'admin' : 'user'); } catch (e) {}\n    const entry = { t: Date.now(), action, relay, detail: detail || '', user };\n    let arr = [];\n    try { arr = JSON.parse(localStorage.getItem('gsp6_edit_log') || '[]'); } catch (e) {}\n    arr.unshift(entry);\n    if (arr.length > 400) arr = arr.slice(0, 400);\n    try { localStorage.setItem('gsp6_edit_log', JSON.stringify(arr)); } catch (e) {}\n    this.forceUpdate();\n  }\n\n  // Zoom about the viewport center (used by the +/- buttons).\n  zoomCenter(factor) {\n    const el = this.canvasEl; if (!el) return;\n    const r = el.getBoundingClientRect();\n    const mx = r.width / 2, my = r.height / 2;\n    const s = this.state;\n    const nz = Math.min(4, Math.max(0.2, s.zoom * factor));\n    const f = nz / s.zoom;\n    this.setState({ zoom: nz, panX: mx - (mx - s.panX) * f, panY: my - (my - s.panY) * f });\n  }\n\n  // Fit the whole SLD (1592×674) into the viewport, centered.\n  fitToScreen() {\n    const el = this.canvasEl; if (!el) return;\n    const r = el.getBoundingClientRect();\n    const W = 3534.89, H = 853.19, PAD = 30;\n    const nz = Math.min((r.width - PAD * 2) / W, (r.height - PAD * 2) / H);\n    this.setState({ zoom: nz, panX: (r.width - W * nz) / 2, panY: (r.height - H * nz) / 2 });\n  }\n\n  componentDidMount() {\n    let names = {};\n    try { names = JSON.parse(localStorage.getItem('gsp6_relay_names') || '{}') || {}; } catch (e) {}\n    let devnums = {};\n    try { devnums = JSON.parse(localStorage.getItem('gsp6_device_numbers') || '{}') || {}; } catch (e) {}\n    let groups = {};\n    try { groups = JSON.parse(localStorage.getItem('gsp6_relay_groups') || '{}') || {}; } catch (e) {}\n    let extras = {};\n    try { extras = JSON.parse(localStorage.getItem('gsp6_extra_relays') || '{}') || {}; } catch (e) {}\n    let cells = {};\n    try { cells = JSON.parse(localStorage.getItem('gsp6_device_cells') || '{}') || {}; } catch (e) {}\n    let funcOff = {};\n    try { funcOff = JSON.parse(localStorage.getItem('gsp6_func_off') || '{}') || {}; } catch (e) {}\n    let funcParams = {};\n    try { funcParams = JSON.parse(localStorage.getItem('gsp6_func_params') || '{}') || {}; } catch (e) {}\n    this.setState({ relayNames: names, deviceNumbers: devnums, relayGroups: groups, extraRelays: extras, deviceCells: cells, funcOff: funcOff, funcParams: funcParams });\n    this.loadRelays();\n  }\n\n  async loadRelays() {\n    try {\n      const headers = {};\n      let t = null;\n      try { t = localStorage.getItem('token'); } catch (e) {}\n      if (t) headers['Authorization'] = 'Bearer ' + t;\n      const r = await fetch('https://gsp-api.onrender.com/api/relays', { headers });\n      if (r.status === 401 || r.status === 403) {\n        // Token expired / invalid → no data can load. Send the user back to Sign In\n        // so a fresh token is issued (empty graphs otherwise look like a \"broken cursor\").\n        try { localStorage.removeItem('token'); } catch (e) {}\n        this.setState({ relayData: {}, authExpired: true });\n        return;\n      }\n      const j = await r.json();\n      const map = {};\n      for (const row of (j.data || [])) { if (row.Relay_ID) map[row.Relay_ID] = row; }\n      this.setState({ relayData: map, authExpired: false });\n    } catch (e) {\n      this.setState({ relayData: {} });\n    }\n  }\n\n  renderVals() {\n    const z = this.state.zoom;\n\n    // ===================== GSP6 SINGLE LINE DIAGRAM =====================\n    const lines = [], buses = [], transformers = [], motors = [], boxes = [],\n          grounds = [], fuses = [], breakers = [], ties = [], labels = [];\n    const cts = [], arrows = [];\n    const L = (x1, y1, x2, y2) => lines.push({ x1, y1, x2, y2 });\n    const BUS = (x, y, w) => buses.push({ x, y, w });\n    const TR = (x, y) => transformers.push({ x, y });\n    const MO = (x, y, t, r) => motors.push({ x, y, t: t || 'M', r: r || 13 });\n    const BOX = (x, y, w, h, t, fs) => boxes.push({ x, y, w, h, t, fs: fs || 8.5, tx: x + w / 2, ty: y + h / 2 + 3 });\n    const GND = (x, y) => grounds.push({ x, y });\n    const FUSE = (x, y) => fuses.push({ x, y });\n    const BRK = (x, y, lbl) => breakers.push({ x, y, lbl: lbl || '' });\n    const TIE = (x, y, lbl) => ties.push({ x, y, rx: x - 7, ry: y - 7, lbl: lbl == null ? 'N.O' : lbl });\n    const T = (x, y, t, a, s) => labels.push({ x, y, t, a: a || 'middle', s: s || 9 });\n    const ML = (x, y, arr, a, s, lh) => arr.forEach((t, i) => labels.push({ x, y: y + i * (lh || 10.5), t, a: a || 'start', s: s || 8 }));\n    const TRLBL = (x, y, nm, z) => ML(x, y, [nm, '3000kVA', '11/0.4kV', 'Dyn 11', z || '%Z=8.5'], 'start', 8, 10);\n\n    const BUSY = 445;\n\n    // ---- corner title + main buses ----\n    BOX(20, 18, 90, 22, 'GSP6 S/S', 11);\n    BUS(55, BUSY, 450);            // 3628SW01A\n    BUS(517, BUSY, 700);           // 3628SW01B\n    T(58, BUSY - 9, '3Ph, 3W, 11kV, 50Hz,3200A, 40kA, 1Sec', 'start', 8);\n    T(1214, BUSY - 9, '3Ph, 3W, 11kV, 50Hz,3200A, 40kA, 1Sec', 'end', 8);\n    T(345, BUSY + 20, '3628SW01A', 'middle', 12);\n    T(760, BUSY + 20, '3628SW01B', 'middle', 12);\n    TIE(511, BUSY, 'N.O');\n\n    // ===== TOP FEEDER 1 (3629SW224 -> 3628TR01A) =====\n    const topFeeder = (x, sw, trLines) => {\n      T(x, 32, sw, 'middle', 10);\n      L(x, 42, x, 150);\n      BOX(x - 60, 158, 30, 16, '400A', 8);\n      L(x - 30, 166, x, 166);\n      TR(x, 162);\n      L(x - 22, 162, x - 40, 162); L(x - 40, 162, x - 40, 196); GND(x - 40, 196);\n      ML(x + 18, 138, trLines, 'start', 8.5, 10.5);\n      L(x, 180, x, BUSY);\n    };\n    topFeeder(315, '3629SW224', ['3628TR01A', '50/55MVA', '33/11.5kV', 'Dyn11, ONAF', '%Z=11']);\n    ML(333, 70, ['18/30 (36)kV, AWA', '4-1Cx400mm/Phase'], 'start', 8.5, 11);\n    BRK(315, 402, 'N.C');\n\n    topFeeder(780, '3629SW228', ['3628TR01B', '50/55MVA', '33/11.5kV', 'Dyn11, ONAF', '%Z=11']);\n    ML(798, 70, ['18/30 (36)kV, AWA', '4-1Cx400mm/Phase'], 'start', 8.5, 11);\n    BRK(780, 402, 'N.C');\n\n    // ===== TOP FEEDER 3 (3629SW219 -> 3625TR01 + GT) =====\n    const F3 = 965, GTx = 1175;\n    topFeeder(F3, '3629SW219', ['3625TR01', '31.5MVA', '33/11kV', 'YNd1, ONAN', '%Z=11']);\n    ML(983, 70, ['18/30 (36)kV, AWA', '2-1Cx400mm/Phase'], 'start', 8.5, 11);\n    BRK(F3, 400, 'N.C');\n    labels.push({ x: F3 + 18, y: 360, t: '8.7/15 (17.5)kV, AWA 6-1Cx400mm/Phase', a: 'middle', s: 8, rot: -90 });\n    // GT branch: cable loop from main vertical (top horizontal) → GT, then earthing down to ground\n    L(F3, 250, GTx, 250);                 // top horizontal cable run\n    L(GTx, 250, GTx, 287);                // down into GT\n    MO(GTx, 305, 'GT', 18);\n    ML(GTx + 24, 297, ['11kV, 50Hz', '25MW'], 'start', 9, 12);\n    L(GTx, 323, GTx, 470);                // GT earthing string down\n    BRK(GTx, 365, 'N.O');\n    ML(GTx + 14, 398, ['8.7/15kV AWA', '1-1Cx185mm'], 'start', 8, 10);\n    FUSE(GTx, 420);\n    T(GTx + 17, 434, '400A', 'start', 8);\n    GND(GTx, 470);\n\n    // ===== 11kV LOADS off main bus =====\n    // Lean Solution Pump (SF start)\n    L(445, BUSY, 445, 660); BRK(445, 495, '');\n    BOX(427, 522, 36, 22, 'SF', 9);\n    ML(467, 528, ['STARTING', 'ONLY'], 'start', 8, 10);\n    BRK(445, 610, '');\n    MO(445, 666, 'M', 14);\n    ML(445, 690, ['3601/2PM002,R', 'LEAN SOLUTION PUMP', '(4MW)'], 'middle', 8.5, 11);\n    // Refrigerant Comp (SF start)\n    L(605, BUSY, 605, 660); BRK(605, 495, '');\n    BOX(587, 522, 36, 22, 'SF', 9);\n    ML(627, 528, ['STARTING', 'ONLY'], 'start', 8, 10);\n    BRK(605, 610, '');\n    MO(605, 666, 'M', 14);\n    ML(605, 690, ['3607CM01', 'REFRIGERANT COMP', '(19MW)'], 'middle', 8.5, 11);\n    // Regeneration Comp (VSD + 11/6.9kV)\n    BRK(885, 495, ''); BRK(945, 495, '');\n    L(885, BUSY, 885, 700); L(945, BUSY, 945, 590);\n    BOX(862, 522, 46, 20, 'VSD', 9);\n    TR(945, 575); ML(963, 568, ['11/6.9kV', '1750KVA'], 'start', 8, 11);\n    L(945, 588, 945, 640); BRK(945, 652, ''); L(945, 664, 945, 700); L(885, 700, 945, 700);\n    BRK(885, 640, '');\n    MO(885, 712, 'M', 14);\n    ML(885, 736, ['3602C001M01', 'REGENERATION COMP.', '(850kW)'], 'middle', 8.5, 11);\n    // Hot Oil Cir Pump (SF + 6.6/11.5kV Siemens)\n    BRK(1015, 495, ''); BRK(1055, 495, '');\n    L(1015, BUSY, 1015, 715); L(1055, BUSY, 1055, 560);\n    BOX(1037, 522, 36, 20, 'SF', 9); ML(1078, 525, ['STARTING', 'ONLY'], 'start', 7.5, 9);\n    TR(1055, 580); ML(1073, 566, ['6.6/11.5kV', '2000kVA', '(BY SIEMENS)'], 'start', 8, 10);\n    L(1055, 596, 1055, 640); BRK(1055, 652, ''); L(1055, 664, 1055, 715); L(1015, 715, 1055, 715);\n    BRK(1015, 640, '');\n    MO(1015, 727, 'M', 14);\n    ML(1015, 751, ['3608PM002A~D', 'HOT OIL CIR. PUMP', '(1800kW)'], 'middle', 8.5, 11);\n    // Dilution Fan (VSD)\n    BRK(1160, 495, '');\n    L(1160, BUSY, 1160, 700);\n    BOX(1138, 522, 46, 20, 'VSD', 9);\n    MO(1160, 712, 'M', 14);\n    ML(1160, 736, ['3634-F-001-CM01', 'DILUTION FAN', '(550kW, 11kV)'], 'middle', 8.5, 11);\n\n    // ===== 400V CASCADE (nested pyramid, cascaded bus-to-bus) =====\n    const cY = [805, 950, 1085, 1212, 1335];\n    const cId = ['06', '05', '04', '03', '02'];\n    const cLeft  = [210, 175, 135, 92, 50];     // left bus left edge per level (widens down)\n    const cRight = [660, 695, 735, 778, 820];   // right bus right edge per level\n    const cCL = 470, cCR = 560;                  // inner ends around the tie\n    cY.forEach((y, i) => {\n      BUS(cLeft[i], y, cCL - cLeft[i]);\n      BUS(cCR, y, cRight[i] - cCR);\n      L(cCL, y, 504, y); TIE(511, y, 'N.O'); L(518, y, cCR, y);\n      T(cLeft[i], y + 16, '400-230V, 5000A, 85kA  3628SW' + cId[i] + 'A', 'start', 8);\n      T(cRight[i], y + 16, '3628SW' + cId[i] + 'B', 'end', 8);\n    });\n    // one cascade column (sign = -1 left, +1 right)\n    const cascadeSide = (sign, edges, names) => {\n      for (let i = 0; i < 5; i++) {\n        const topY = (i === 0) ? BUSY : cY[i - 1];\n        const botY = cY[i];\n        const x = (i === 0) ? edges[0] : edges[i - 1];   // sits at outer end of bus above\n        const ty = (topY + botY) / 2 + (i === 0 ? 60 : 0);\n        L(x, topY, x, ty - 12);\n        TR(x, ty);\n        L(x, ty + 12, x, botY);\n        BRK(x, (ty + botY) / 2 + 4, 'N.C');\n        // earthing stub on the outer side\n        const gx = x + sign * 24;\n        L(x, ty, gx, ty); GND(gx, ty + 2);\n        // transformer label on the inner side\n        const lx = x - sign * 16;\n        ['3000kVA', '11/0.4kV', 'Dyn 11', '%Z=8.5'].forEach((tline, j) =>\n          labels.push({ x: lx, y: ty - 24 + j * 10, t: tline, a: sign < 0 ? 'start' : 'end', s: 8, rotT: '' }));\n        labels.push({ x: lx, y: ty - 34, t: names[i], a: sign < 0 ? 'start' : 'end', s: 8, rotT: '' });\n        // 1250A sub-bus label at the TR05 level\n        if (i === 1) {\n          labels.push({ x: lx, y: ty - 56, t: '400-230V, 1250A, 85kA', a: sign < 0 ? 'start' : 'end', s: 7.5, rotT: '' });\n          labels.push({ x: lx, y: ty - 46, t: '3628SW06C' + (sign < 0 ? 'A' : 'B'), a: sign < 0 ? 'start' : 'end', s: 7.5, rotT: '' });\n        }\n      }\n    };\n    cascadeSide(-1, cLeft, ['3628TR06A', '3628TR05A', '3628TR04A', '3628TR03A', '3628TR02A']);\n    cascadeSide(1, cRight, ['3628TR06B', '3628TR05B', '3628TR03B', '3628TR03B', '3628TR02B']);\n\n    // ===== DG / LOAD BANK (bottom right) =====\n    MO(910, 1075, 'DG', 18);\n    ML(936, 1066, ['0.4kV', '1800kW', 'PF=0.8'], 'start', 8.5, 11);\n    L(910, 1093, 910, 1335);                       // main vertical down to bottom bus\n    BUS(735, 1335, 180);                           // extend bottom 0.4kV bus under DG\n    BRK(910, 1165, 'N.C');                          // N.C on DG vertical\n    L(910, 1215, 1110, 1215);                       // branch right to load bank drop\n    L(1110, 1215, 1110, 1268);                      // drop to load bank\n    BRK(1110, 1240, 'N.O');                          // N.O on load bank drop\n    BOX(1065, 1270, 90, 28, 'LOAD BANK', 9.5);\n    T(1110, 1318, '(900 kW)', 'middle', 9);\n    BRK(910, 1300, 'N.O');                           // N.O where DG vertical meets bottom bus\n\n    labels.forEach((l) => { l.rotT = l.rot ? ('rotate(' + l.rot + ' ' + l.x + ' ' + l.y + ')') : ''; });\n\n    // Make every breaker a clickable relay; selecting one drives the sidebar.\n    const selId = this.state.selectedRelayId;\n    const levelOf = (y) => y < 360 ? '33 / 11kV' : (y < 460 ? '11kV' : '0.4kV');\n    const BRKPTS = [[2506,195],[2582,238],[1291,241],[2280,241],[2795,251],[1795,361],[153,396],[252,396],[343,397],[461,397],[556,397],[646,397],[733,397],[819,397],[901,397],[988,397],[1065,397],[1157,397],[1242,397],[1356,397],[1469,399],[1588,399],[1703,399],[1887,399],[2003,399],[2112,399],[2223,399],[2327,399],[2413,399],[2485,399],[2574,399],[2666,399],[2760,399],[2872,399],[2959,399],[3038,399],[3126,399],[3215,399],[3310,399],[3401,399],[733,485],[2760,492],[2872,492],[343,498],[3215,500],[646,549],[2959,550],[343,585],[3215,588],[1703,619],[1887,619],[1588,659],[2003,659],[1469,699],[2112,699],[1356,737],[2223,739],[1242,770],[2327,772]];\n    const breakerItems = BRKPTS.map((p, i) => {\n      const bx = p[0], by = p[1];\n      const id = 'GSP6-R' + String(i + 1).padStart(2, '0');\n      return {\n        x: bx, y: by, id, level: levelOf(by), selected: id === selId,\n        onClick: () => this.setState({ selectedRelayId: id, popupRelayId: id, editMode: false, editValues: {}, saveError: null, saveOk: false, funcSel: '51', graphElem: 'Phase' }),\n      };\n    });\n    const names = this.state.relayNames || {};\n    const dn = (id) => (id && names[id]) ? names[id] : id;\n    const selB = breakerItems.find((b) => b.id === selId) || null;\n    const sel = {\n      id: selB ? dn(selB.id) : '—',\n      type: selB ? 'Protection Relay' : '—',\n      level: selB ? selB.level : '—',\n      hasSel: !!selB,\n    };\n\n    // Parameter popup for the clicked relay (values from the live API row).\n    // A breaker can carry several relays; relayGroups[popupId] lists their keys.\n    c    for (let i = 0; i < chosen.length; i++) {\n      for (let j = i + 1; j < chosen.length; j++) {\n        const A2 = chosen.map((r0) => num(r0[coordElem + '_Prim_Amps']) || num(r0[coordElem + '_Pickup']));\n        const a = chosen[i], b = chosen[j];\n        const pkA = A2[i], pkB = A2[j];\n        const testA = Math.max(pkA, pkB) * 3; // compare at 3× the larger pickup\n        const tAt = (r0, pk) => {\n          const kind = curveKind(r0[coordElem + '_Curve']);\n          const cc = CURVE_CONST[kind] || CURVE_CONST.SI;\n          const TD = num(r0[coordElem + '_Time_Dial']) || (coordElem === 'Phase' ? 0.2 : 0.1);\n          const M = testA / pk; if (M <= 1.02) return null;\n          return TD * cc.k / (Math.pow(M, cc.a) - 1) + (cc.b ? TD * cc.b : 0);\n        };\n        const tA = tAt(a, pkA), tB = tAt(b, pkB);\n        if (tA == null || tB == null) continue;\n        const cti = Math.abs(tA - tB);\n        coordChecks.push({\n          pair: a.Relay_ID + ' ↔ ' + b.Relay_ID,\n          cti: cti.toFixed(2) + ' s',\n          ok: cti >= 0.3,\n          bad: cti < 0.3,\n          note: cti >= 0.3 ? 'ประสานดี (CTI ≥ 0.3s)' : 'ใกล้เกินไป — เสี่ยงตัดพร้อมกัน',\n        });\n      }\n    }\n\n    const sidebarOpen = this.state.sidebarOpen !== false;\n    const toggleSidebar = () => this.setState({ sidebarOpen: !sidebarOpen });\n\n    const exportCsv = () => {\n      const data = this.state.relayData ? Object.values(this.state.relayData) : [];\n      if (!data.length) { return; }\n      const cols = Object.keys(data[0]);\n      const esc = (val) => val == null ? '' : (/[\",\\n]/.test(String(val)) ? '\"' + String(val).replace(/\"/g, '\"\"') + '\"' : String(val));\n      const csv = [cols.join(','), ...data.map((r) => cols.map((c) => esc(r[c])).join(','))].join('\\n');\n      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = 'GS nStart: (e) => {\n        if (e.button !== 0) return;\n        const startX = e.clientX, startY = e.clientY;\n        const s0 = { x: this.state.panX, y: this.state.panY };\n        const el = this.canvasEl;\n        let moved = false;\n        const mv = (ev) => {\n          const dx = ev.clientX - startX, dy = ev.clientY - startY;\n          if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;\n          if (moved) this.setState({ panX: s0.x + dx, panY: s0.y + dy });\n          if (el) el.style.cursor = 'grabbing';\n        };\n        const up = () => {\n          window.removeEventListener('mousemove', mv);\n          window.removeEventListener('mouseup', up);\n          if (el) el.style.cursor = 'grab';\n        };\n        window.addEventListener('mousemove', mv);\n        window.addEventListener('mouseup', up);\n      },\n      zoomDbl: (e) => {\n        const el = this.canvasEl; if (!el) return;\n        const rect = el.getBoundingClientRect();\n        const mx = e.clientX - rect.left, my = e.clientY - rect.top;\n        const s = this.state;\n        const nz = Math.min(4, s.zoom * 1.6);\n        const f = nz / s.zoom;\n        this.setState({ zoom: nz, panX: mx - (mx - s.panX) * f, panY: my - (my - s.panY) * f });\n      },\n      zoomIn: () => this.zoomCenter(1.25),\n      zoomOut: () => this.zoomCenter(1 / 1.25),\n      zoomFit: () => this.fitToScreen(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
